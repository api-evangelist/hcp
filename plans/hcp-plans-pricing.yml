specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: HashiCorp Cloud Platform
providerId: hcp
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Cloud
  - Infrastructure
  - DevOps
  - Secrets Management
  - Service Networking
description: HashiCorp Cloud Platform (HCP) is the managed-service offering for HashiCorp products
  (Terraform, Vault, Consul, Boundary, Packer, Waypoint, Nomad). HCP Terraform is the most
  publicly priced product, with three pay-as-you-go tiers (Essentials, Standard, Premium) billed
  per managed resource per month or per hour. New customers receive a $500 platform credit usable
  across HCP. Self-managed Terraform Enterprise and HCP Terraform Europe are custom-priced. Other
  HCP products (Vault, Consul, etc.) follow the HCP free-trial-then-PAYG model with their own
  per-product meters.
sources:
  - https://www.hashicorp.com/en/products/terraform/pricing
plans:
  - id: hcp-free-trial
    name: HCP Free Trial / Credits
    type: freemium
    description: New HCP customers receive a $500 platform credit usable across HCP products on
      pay-as-you-go pricing. Once consumed, billing transitions to the per-product PAYG rate.
    entries:
      - label: New-customer credit
        description: One-time platform credit
        name: signup_credit
        type: flat
        metric: USD
        limit: 500
        timeFrame: usage
        geo: global
        domains:
          - https://api.cloud.hashicorp.com
        unit: 1
        price: $500 credit
        userMultiplied: false
    elements:
      - name: HCP Vault Secrets API
      - name: HCP Packer API
      - name: HCP Consul API
      - name: HCP Boundary API
      - name: HCP Waypoint API
      - name: $500 platform credit
  - id: hcp-terraform-essentials
    name: HCP Terraform — Essentials
    type: usage-based
    description: Pay-as-you-go HCP Terraform tier for individuals and teams adopting infrastructure
      as code. Billed per Terraform-managed resource.
    entries:
      - label: Per managed resource (monthly)
        description: Monthly rate per managed Terraform resource on Essentials
        name: managed_resource_month
        type: metered
        metric: resource
        limit: -1
        timeFrame: month
        geo: global
        domains:
          - https://app.terraform.io
        unit: 1
        price: $0.10/month per resource
        userMultiplied: false
      - label: Per managed resource (hourly)
        description: Hourly rate per managed Terraform resource on Essentials
        name: managed_resource_hour
        type: metered
        metric: resource
        limit: -1
        timeFrame: hour
        geo: global
        domains:
          - https://app.terraform.io
        unit: 1
        price: $0.00013/hour per resource
        userMultiplied: false
    elements:
      - name: HCP Terraform (managed)
      - name: Pay-as-you-go billing
  - id: hcp-terraform-standard
    name: HCP Terraform — Standard
    type: usage-based
    description: HCP Terraform tier for enterprises standardizing infrastructure automation.
      Includes HCP Waypoint.
    entries:
      - label: Per managed resource (monthly)
        description: Monthly rate per managed Terraform resource on Standard
        name: managed_resource_month
        type: metered
        metric: resource
        limit: -1
        timeFrame: month
        geo: global
        domains:
          - https://app.terraform.io
        unit: 1
        price: $0.47/month per resource
        userMultiplied: false
      - label: Per managed resource (hourly)
        description: Hourly rate per managed Terraform resource on Standard
        name: managed_resource_hour
        type: metered
        metric: resource
        limit: -1
        timeFrame: hour
        geo: global
        domains:
          - https://app.terraform.io
        unit: 1
        price: $0.00064/hour per resource
        userMultiplied: false
    elements:
      - name: HCP Terraform (managed)
      - name: HCP Waypoint included
  - id: hcp-terraform-premium
    name: HCP Terraform — Premium
    type: usage-based
    description: Top-tier HCP Terraform pricing with all premium capabilities. Includes HCP Waypoint.
    entries:
      - label: Per managed resource (monthly)
        description: Monthly rate per managed Terraform resource on Premium
        name: managed_resource_month
        type: metered
        metric: resource
        limit: -1
        timeFrame: month
        geo: global
        domains:
          - https://app.terraform.io
        unit: 1
        price: $0.99/month per resource
        userMultiplied: false
      - label: Per managed resource (hourly)
        description: Hourly rate per managed Terraform resource on Premium
        name: managed_resource_hour
        type: metered
        metric: resource
        limit: -1
        timeFrame: hour
        geo: global
        domains:
          - https://app.terraform.io
        unit: 1
        price: $0.00135/hour per resource
        userMultiplied: false
    elements:
      - name: HCP Terraform (managed)
      - name: HCP Waypoint included
      - name: All Premium capabilities
  - id: hcp-terraform-europe
    name: HCP Terraform Europe
    type: enterprise
    description: HCP Terraform with European data residency for regulated EU customers. Custom-priced
      via sales.
    entries:
      - label: Plan price
        description: Custom-quoted by sales
        name: plan_price
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: EU
        domains:
          - https://app.terraform.io
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: EU data residency
      - name: HCP Terraform
  - id: hcp-enterprise
    name: HCP Enterprise (Vault / Consul / Boundary / Packer / Waypoint)
    type: enterprise
    description: Custom-quoted enterprise tier for HCP Vault, Consul, Boundary, Packer, and
      Waypoint. Includes dedicated capacity, SLAs, and TAM. Per-product meters apply (cluster-hour,
      secret, etc.).
    entries:
      - label: Plan price
        description: Custom-quoted by sales
        name: plan_price
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: configurable
        domains:
          - https://api.cloud.hashicorp.com
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: 24/7 Dedicated Support
      - name: Contractual SLA
      - name: Security & Compliance Review
      - name: Dedicated Account Manager
      - name: Custom Data Residency
      - name: HCP Vault Secrets API
      - name: HCP Packer API
      - name: HCP Consul API
      - name: HCP Boundary API
      - name: HCP Waypoint API
maintainers:
