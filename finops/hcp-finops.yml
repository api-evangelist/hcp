specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: HashiCorp Cloud Platform
providerId: hcp
publisherName: HashiCorp, Inc. (an IBM company)
serviceCategory: Cloud / Managed Infrastructure Services
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Cloud
  - Infrastructure
  - DevOps
  - Secrets Management
  - Service Networking
  - FinOps
  - Cost Management
  - FOCUS
description: 'FOCUS-aligned FinOps for HashiCorp Cloud Platform: pay-as-you-go per-managed-resource
  pricing on HCP Terraform (Essentials $0.10, Standard $0.47, Premium $0.99 per resource per month;
  hourly rates also published) plus per-product meters for Vault Secrets, Consul, Boundary, Packer,
  and Waypoint. New-customer $500 platform credit is recognized as a FOCUS Credit line.'
sources:
  - https://www.hashicorp.com/en/products/terraform/pricing
  - https://developer.hashicorp.com/terraform/cloud-docs/api-docs
principles:
  - name: Visibility
    description: Use the HCP billing dashboard and per-product usage views; export usage for
      Terraform managed-resource counts and HCP cluster hours into your FOCUS billing pipeline.
  - name: Allocation
    description: Allocate Terraform spend by Workspace and Project; allocate Vault / Consul /
      Boundary spend by HCP cluster (and the application teams that mount them).
  - name: Optimization
    description: Reduce managed-resource counts via state pruning and module consolidation; pick
      the lowest HCP Terraform tier (Essentials / Standard / Premium) that meets governance needs;
      consume the $500 new-customer credit before committing to PAYG.
  - name: Accountability
    description: Assign a HashiCorp account owner per HCP Organization; review managed-resource
      growth and HCP cluster hours monthly against the run-rate.
domains:
  - name: Understand Usage and Cost
    capabilities:
      - Data Ingestion
      - Allocation
      - Reporting and Analytics
      - Anomaly Management
  - name: Quantify Business Value
    capabilities:
      - Planning and Estimating
      - Forecasting
      - Budgeting
      - Benchmarking
      - Unit Economics
  - name: Optimize Usage and Cost
    capabilities:
      - Architecting for Cloud
      - Rate Optimization
      - Workload Optimization
      - Cloud Sustainability
      - Licensing and SaaS
  - name: Manage the FinOps Practice
    capabilities:
      - FinOps Practice Operations
      - FinOps Education and Enablement
      - Invoicing and Chargeback
      - Onboarding Workloads
      - Intersecting Disciplines
billingModel:
  pricingCategory: Pay-As-You-Go + Committed Use
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Credit
    - Adjustment
  chargeFrequency: Recurring
focusColumns:
  ServiceName: HashiCorp Cloud Platform
  ServiceCategory: Cloud / Managed Infrastructure Services
  ProviderName: HashiCorp Cloud Platform
  PublisherName: HashiCorp, Inc. (an IBM company)
  InvoiceIssuerName: HashiCorp, Inc.
  PricingCategory: Pay-As-You-Go
  PricingUnit: managed-resource / cluster-hour
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: terraform_managed_resources
    description: Count of Terraform-managed resources, billed monthly per the active HCP Terraform
      tier (Essentials / Standard / Premium)
    unit: resource-month
    aggregation: max
    dimensions:
      - tier
      - workspace
      - project
      - organization
  - name: terraform_managed_resource_hours
    description: Hourly metering of managed Terraform resources
    unit: resource-hour
    aggregation: sum
    dimensions:
      - tier
      - workspace
      - organization
  - name: hcp_cluster_hours
    description: Cluster-hours for HCP Vault / Consul / Boundary / Packer / Waypoint
    unit: cluster-hour
    aggregation: sum
    dimensions:
      - product
      - tier
      - region
  - name: vault_secrets
    description: HCP Vault Secrets stored / synced
    unit: secret
    aggregation: max
    dimensions:
      - cluster
      - app
  - name: hcp_credit_consumption
    description: Consumption of the $500 new-customer HCP credit
    unit: USD
    aggregation: sum
    dimensions:
      - product
  - name: api_requests
    description: HCP API requests (allocation / abuse-monitoring meter; not directly billable)
    unit: request
    aggregation: sum
    dimensions:
      - api
      - endpoint
      - region
      - consumer
apis:
  - name: HCP Vault Secrets API
    baseURL: https://api.cloud.hashicorp.com
    tags:
      - Secrets Management
      - Vault
      - Cloud
    serviceName: HCP Vault Secrets API
    serviceCategory: API
  - name: HCP Packer API
    baseURL: https://api.cloud.hashicorp.com
    tags:
      - Packer
      - Images
      - DevOps
    serviceName: HCP Packer API
    serviceCategory: API
  - name: HCP Consul API
    baseURL: https://api.cloud.hashicorp.com
    tags:
      - Consul
      - Service Mesh
      - Service Networking
    serviceName: HCP Consul API
    serviceCategory: API
  - name: HCP Boundary API
    baseURL: https://api.cloud.hashicorp.com
    tags:
      - Boundary
      - Remote Access
      - Identity
    serviceName: HCP Boundary API
    serviceCategory: API
  - name: HCP Waypoint API
    baseURL: https://api.cloud.hashicorp.com
    tags:
      - Waypoint
      - Application Delivery
      - DevOps
    serviceName: HCP Waypoint API
    serviceCategory: API
unitEconomics:
  - name: Cost per Managed Resource
    metric: billed_cost / terraform_managed_resources
    target: TBD
  - name: Cost per Cluster-Hour
    metric: billed_cost / hcp_cluster_hours
    target: TBD
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
