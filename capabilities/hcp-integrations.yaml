      description: List integrations
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: hcp-integrations.listintegrations
      with:
        org_id: tools.org_id
        project_id: tools.project_id
      outputParameters:
      - type: object
        mapping: $.
