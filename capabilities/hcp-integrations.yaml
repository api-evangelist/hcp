    description: HCP Vault Secrets API — Integrations business capability. Self-contained, no shared references.
    resources:
    - name: secrets-2023-11-28-organizations-org_id-projects-project_id-integrations
      path: /secrets/2023-11-28/organizations/{org_id}/projects/{project_id}/integrations
      operations:
      - name: listintegrations
        method: GET
        description: List integrations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: org_id
          in: path
          type: string
          required: true
        - name: project_id
          in: path
          type: string
          required: true
