aid: hcp
name: HashiCorp Cloud Platform
description: HashiCorp Cloud Platform (HCP) is a fully managed platform for HashiCorp products including Vault, Consul, Packer,
  Boundary, Waypoint, and Terraform. HCP provides a unified set of APIs for managing infrastructure, secrets, service networking,
  and image pipelines across cloud and on-premises environments.
