  - aid: hcp:hcp-consul
    name: HCP Consul API
    description: The HCP Consul API enables management of HCP Consul clusters, including provisioning, scaling, and federation
      for service networking and service mesh deployments.
    humanURL: https://developer.hashicorp.com/hcp/api-docs/consul
    baseURL: https://api.cloud.hashicorp.com
    tags:
